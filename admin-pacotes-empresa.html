<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacotes de empresas — Admin Puzzle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #F5F7F5;
    --surface: #FFFFFF;
    --text-primary: #1F2A28;
    --text-secondary: #55625F;
    --text-muted: #8A948F;
    --primary: #2F6E5D;
    --primary-dark: #1F4F42;
    --accent-soft: #DCEEE7;
    --border: #DCE3E0;
    --success-bg: #E6F4EA;
    --success-text: #1E7B34;
    --warning-bg: #FDF3E7;
    --warning-text: #8A5A00;
    --danger-bg: #FBEAEA;
    --danger-text: #A32D2D;
    --radius: 10px;
    --font-display: 'Newsreader', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    line-height: 1.6;
  }

  .page { max-width: 920px; margin: 0 auto; padding: 40px 20px 80px; }

  header.intro {
    margin-bottom: 28px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  header.intro h1 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 26px;
    margin: 0;
    color: var(--primary-dark);
  }

  button.btn {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid transparent;
  }

  button.btn:disabled { opacity: 0.5; cursor: not-allowed; }
  button.btn.primary { background: var(--primary); color: #fff; }
  button.btn.ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  button.btn.danger { background: var(--danger-bg); color: var(--danger-text); }

  .empresa-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .empresa-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .empresa-header .nome {
    font-size: 16px;
    font-weight: 500;
  }

  .empresa-header .plano {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .pacotes-list { border-top: 1px solid var(--border); }

  .pacote-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .pacote-row:last-child { border-bottom: none; }

  .pacote-vagas { font-weight: 500; }

  .pacote-vagas .barra {
    display: inline-block;
    width: 80px;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    margin-left: 8px;
    overflow: hidden;
    vertical-align: middle;
  }

  .pacote-vagas .barra .fill {
    height: 100%;
    background: var(--primary);
  }

  .pacote-vigencia { color: var(--text-secondary); }

  .status-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
    justify-self: start;
  }

  .status-tag.ativo { background: var(--success-bg); color: var(--success-text); }
  .status-tag.esgotado { background: var(--warning-bg); color: var(--warning-text); }
  .status-tag.expirado { background: var(--danger-bg); color: var(--danger-text); }

  .empty-pacotes {
    padding: 16px 20px;
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  .novo-pacote-form {
    padding: 16px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: none;
  }

  .novo-pacote-form.open { display: block; }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-grid label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .form-grid input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 13px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary-dark);
    color: #fff;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .toast.visible { opacity: 1; }
</style>
</head>
<body>

<div class="page">
  <header class="intro">
    <h1>Pacotes de vagas sociais por empresa</h1>
  </header>

  <div id="listaEmpresas"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---------------------------------------------------------------------
  // Mesma configuração usada nos outros arquivos — troque pela real ou
  // importe o supabaseClient.js compartilhado, se existir.
  // ---------------------------------------------------------------------
  const SUPABASE_URL = 'https://xzkmokjyaqutkjxqlkck.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_5OMjosvKS6_Mt3gGYUxQ0w_JrMtH1jZ';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 3000);
  }

  function statusPacote(pacote) {
    const hoje = new Date().toISOString().slice(0, 10);
    if (pacote.vigencia_fim < hoje) return 'expirado';
    if (pacote.vagas_ocupadas >= pacote.quantidade_vagas) return 'esgotado';
    return 'ativo';
  }

  function statusLabel(status) {
    return { ativo: 'Ativo', esgotado: 'Esgotado', expirado: 'Expirado' }[status];
  }

  async function carregarEmpresasEPacotes() {
    const container = document.getElementById('listaEmpresas');

    const [{ data: empresas, error: errEmpresas }, { data: pacotes, error: errPacotes }] = await Promise.all([
      supabase.from('empresas').select('id, nome, plano').order('nome'),
      supabase.from('pacotes_empresa').select('*').order('vigencia_fim', { ascending: true }),
    ]);

    if (errEmpresas || errPacotes) {
      container.innerHTML = `<div class="empty-state"><p>Não foi possível carregar os dados.</p></div>`;
      return;
    }

    if (!empresas || empresas.length === 0) {
      container.innerHTML = `<div class="empty-state"><p>Nenhuma empresa cadastrada ainda.</p></div>`;
      return;
    }

    container.innerHTML = '';
    empresas.forEach((empresa) => {
      const pacotesDaEmpresa = (pacotes || []).filter((p) => p.empresa_id === empresa.id);
      container.appendChild(renderEmpresaCard(empresa, pacotesDaEmpresa));
    });
  }

  function renderEmpresaCard(empresa, pacotesDaEmpresa) {
    const card = document.createElement('div');
    card.className = 'empresa-card';

    const pacotesHtml = pacotesDaEmpresa.length
      ? pacotesDaEmpresa.map((p) => {
          const status = statusPacote(p);
          const pct = Math.min(100, Math.round((p.vagas_ocupadas / p.quantidade_vagas) * 100));
          return `
            <div class="pacote-row">
              <div class="pacote-vagas">
                ${p.vagas_ocupadas} / ${p.quantidade_vagas} vagas
                <span class="barra"><span class="fill" style="width:${pct}%"></span></span>
              </div>
              <div class="pacote-vigencia">${formatarData(p.vigencia_inicio)} – ${formatarData(p.vigencia_fim)}</div>
              <span class="status-tag ${status}">${statusLabel(status)}</span>
              <button class="btn ghost btn-estender" data-id="${p.id}" data-vigencia="${p.vigencia_fim}">Estender vigência</button>
            </div>
          `;
        }).join('')
      : '<div class="empty-pacotes">Nenhum pacote cadastrado para esta empresa.</div>';

    card.innerHTML = `
      <div class="empresa-header">
        <div>
          <div class="nome">${empresa.nome}</div>
          <div class="plano">${empresa.plano || 'Sem plano definido'}</div>
        </div>
        <button class="btn primary btn-novo-pacote">Novo pacote</button>
      </div>
      <div class="pacotes-list">${pacotesHtml}</div>
      <div class="novo-pacote-form" id="form-${empresa.id}">
        <div class="form-grid">
          <div>
            <label>Quantidade de vagas</label>
            <input type="number" min="1" class="input-vagas" placeholder="Ex: 20">
          </div>
          <div>
            <label>Valor pago (R$)</label>
            <input type="number" min="0" step="0.01" class="input-valor" placeholder="Ex: 2000.00">
          </div>
          <div>
            <label>Início da vigência</label>
            <input type="date" class="input-inicio">
          </div>
          <div>
            <label>Fim da vigência</label>
            <input type="date" class="input-fim">
          </div>
        </div>
        <button class="btn primary btn-salvar-pacote">Salvar pacote</button>
        <button class="btn ghost btn-cancelar-pacote">Cancelar</button>
      </div>
    `;

    const formDiv = card.querySelector(`#form-${empresa.id}`);

    card.querySelector('.btn-novo-pacote').addEventListener('click', () => {
      formDiv.classList.toggle('open');
      if (formDiv.classList.contains('open')) {
        formDiv.querySelector('.input-inicio').value = new Date().toISOString().slice(0, 10);
      }
    });

    card.querySelector('.btn-cancelar-pacote').addEventListener('click', () => {
      formDiv.classList.remove('open');
    });

    card.querySelector('.btn-salvar-pacote').addEventListener('click', async () => {
      const quantidade = Number(formDiv.querySelector('.input-vagas').value);
      const valor = formDiv.querySelector('.input-valor').value;
      const inicio = formDiv.querySelector('.input-inicio').value;
      const fim = formDiv.querySelector('.input-fim').value;

      if (!quantidade || quantidade < 1 || !inicio || !fim) {
        showToast('Preencha quantidade de vagas, início e fim da vigência.');
        return;
      }
      if (fim < inicio) {
        showToast('A data de fim precisa ser depois da data de início.');
        return;
      }

      const { error } = await supabase.from('pacotes_empresa').insert({
        empresa_id: empresa.id,
        quantidade_vagas: quantidade,
        valor_pago: valor ? Number(valor) : null,
        vigencia_inicio: inicio,
        vigencia_fim: fim,
      });

      if (error) {
        showToast('Não foi possível salvar o pacote.');
        return;
      }

      showToast('Pacote criado. Pacientes em espera foram reavaliados automaticamente.');
      carregarEmpresasEPacotes();
    });

    card.querySelectorAll('.btn-estender').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const novaData = prompt('Nova data de fim da vigência (AAAA-MM-DD):', btn.dataset.vigencia);
        if (!novaData) return;

        const { error } = await supabase
          .from('pacotes_empresa')
          .update({ vigencia_fim: novaData })
          .eq('id', btn.dataset.id);

        if (error) {
          showToast('Não foi possível atualizar a vigência.');
          return;
        }

        showToast('Vigência atualizada. Fila de espera reprocessada automaticamente.');
        carregarEmpresasEPacotes();
      });
    });

    return card;
  }

  function formatarData(iso) {
    if (!iso) return '';
    const [ano, mes, dia] = iso.split('-');
    return `${dia}/${mes}/${ano}`;
  }

  carregarEmpresasEPacotes();
</script>

</body>
</html>
